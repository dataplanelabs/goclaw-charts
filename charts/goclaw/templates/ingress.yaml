{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "goclaw.fullname" . }}
  labels:
    {{- include "goclaw.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ include "goclaw.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "goclaw.fullname" . }}
                port:
                  number: {{ .Values.server.port }}
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "goclaw.fullname" . }}
                port:
                  number: {{ .Values.server.port }}
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ include "goclaw.fullname" . }}
                port:
                  number: {{ .Values.server.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                {{- if .Values.ui.enabled }}
                name: {{ include "goclaw.fullname" . }}-ui
                port:
                  number: {{ .Values.ui.port }}
                {{- else }}
                name: {{ include "goclaw.fullname" . }}
                port:
                  number: {{ .Values.server.port }}
                {{- end }}
{{- end }}
