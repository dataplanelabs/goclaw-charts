apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "goclaw.fullname" . }}
  labels:
    {{- include "goclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicas }}
  strategy:
    type: {{ .Values.server.strategy.type }}
    {{- if eq .Values.server.strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.server.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.server.strategy.rollingUpdate.maxUnavailable }}
    {{- else }}
    rollingUpdate: null
    {{- end }}
  selector:
    matchLabels:
      {{- include "goclaw.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "goclaw.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.db.enabled }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "goclaw.fullname" . }}-db 5432; do echo waiting for db; sleep 2; done']
      {{- end }}
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "goclaw.fullname" . }}
            - secretRef:
                name: {{ include "goclaw.secretName" . }}
          env:
            {{- if .Values.externalDatabase.url }}
            - name: GOCLAW_POSTGRES_DSN
              value: {{ .Values.externalDatabase.url | quote }}
            {{- else }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.config.existingSecret }}
                  name: {{ .Values.config.existingSecret }}
                  {{- else if and (not .Values.db.enabled) .Values.externalDatabase.existingSecret }}
                  name: {{ .Values.externalDatabase.existingSecret }}
                  {{- else }}
                  name: {{ include "goclaw.fullname" . }}
                  {{- end }}
                  key: POSTGRES_PASSWORD
            - name: GOCLAW_POSTGRES_DSN
              value: "postgres://{{ include "goclaw.dbUser" . }}:$(POSTGRES_PASSWORD)@{{ include "goclaw.dbHost" . }}:{{ include "goclaw.dbPort" . }}/{{ include "goclaw.dbName" . }}?sslmode=disable"
            {{- end }}
            {{- if .Values.persistence.data.enabled }}
            - name: GOCLAW_CONFIG
              value: /app/data/config.json
            {{- end }}
            {{- with .Values.server.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.persistence.data.enabled }}
            - name: data
              mountPath: /app/data
            {{- end }}
            {{- if .Values.persistence.workspace.enabled }}
            - name: workspace
              mountPath: /app/workspace
            {{- end }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelay }}
            periodSeconds: {{ .Values.probes.startup.period }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            periodSeconds: {{ .Values.probes.readiness.period }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            periodSeconds: {{ .Values.probes.liveness.period }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
        {{- if .Values.browser.enabled }}
        - name: chrome
          image: {{ .Values.browser.image | quote }}
          args:
            - --no-sandbox
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port={{ .Values.browser.port }}
            - --remote-allow-origins=*
            - --disable-gpu
            - --disable-dev-shm-usage
          ports:
            - name: cdp
              containerPort: {{ .Values.browser.port }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /json/version
              port: cdp
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /json/version
              port: cdp
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /json/version
              port: cdp
            periodSeconds: 30
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.browser.resources | nindent 12 }}
          volumeMounts:
            - name: chrome-shm
              mountPath: /dev/shm
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
        {{- end }}
      volumes:
        {{- if .Values.browser.enabled }}
        - name: chrome-shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.browser.shmSize | quote }}
        {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.persistence.data.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "goclaw.fullname" . }}-data
        {{- end }}
        {{- if .Values.persistence.workspace.enabled }}
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "goclaw.fullname" . }}-workspace
        {{- end }}
