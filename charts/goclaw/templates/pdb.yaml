{{- if .Values.server.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "goclaw.fullname" . }}
  labels:
    {{- include "goclaw.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  {{- with .Values.server.podDisruptionBudget.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with .Values.server.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "goclaw.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
{{- end }}
---
{{- if and .Values.ui.enabled .Values.ui.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "goclaw.fullname" . }}-ui
  labels:
    {{- include "goclaw.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  {{- with .Values.ui.podDisruptionBudget.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with .Values.ui.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "goclaw.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
{{- end }}
