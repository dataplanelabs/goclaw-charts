apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "goclaw.fullname" . }}
  labels:
    {{- include "goclaw.labels" . | nindent 4 }}
data:
  GOCLAW_HOST: "0.0.0.0"
  GOCLAW_PORT: {{ .Values.server.port | quote }}
  GOCLAW_DATA_DIR: "/app/data"
  GOCLAW_WORKSPACE: "/app/workspace"
  {{- if .Values.browser.enabled }}
  GOCLAW_BROWSER_REMOTE_URL: "ws://localhost:{{ .Values.browser.port }}"
  {{- end }}
