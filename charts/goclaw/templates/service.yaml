apiVersion: v1
kind: Service
metadata:
  name: {{ include "goclaw.fullname" . }}
  labels:
    {{- include "goclaw.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    {{- include "goclaw.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: {{ .Values.server.port }}
      targetPort: http
      protocol: TCP
