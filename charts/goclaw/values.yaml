# -- Global settings shared across all components
global:
  # -- Image pull secrets for private registries (e.g., GHCR, Docker Hub, ECR, GCR)
  # Example:
  #   imagePullSecrets:
  #     - name: ghcr-credentials
  imagePullSecrets: []

# -- GoClaw server image
# Available registries:
#   GHCR (default): ghcr.io/dataplanelabs/goclaw   (public, no pull secret needed)
#   Upstream:       ghcr.io/nextlevelbuilder/goclaw
#   Docker Hub:     digitop/goclaw
# The dataplanelabs build is a single image with embedded web UI + Python runtime.
# Tags: vX.Y.Z (semver), main, sha-<short>, latest
image:
  repository: ghcr.io/dataplanelabs/goclaw
  tag: "v3.11.3"
  pullPolicy: IfNotPresent

# -- GoClaw API server
server:
  replicas: 1
  port: 18790
  # RollingUpdate for zero-downtime on single-node clusters (RWO PVC mounts on same node).
  # Use Recreate on multi-node clusters with RWO PVCs to avoid mount conflicts.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi
  extraEnv: []
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1

# -- GoClaw web UI (separate nginx-based image)
# Available registries:
#   GHCR (default): ghcr.io/dataplanelabs/goclaw-web   (public, no pull secret needed)
#   Upstream:       ghcr.io/nextlevelbuilder/goclaw-web
#   Docker Hub:     digitop/goclaw-web
ui:
  enabled: true
  image:
    repository: ghcr.io/dataplanelabs/goclaw-web
    tag: "v3.11.3"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1

# -- Sidecar PostgreSQL with pgvector (dev/testing only).
# For production, disable and use externalDatabase instead.
db:
  enabled: true
  image: pgvector/pgvector:pg18
  storage: 20Gi
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- External PostgreSQL connection (used when db.enabled=false)
externalDatabase:
  url: ""
  host: ""
  port: 5432
  name: "goclaw"
  user: "goclaw"
  existingSecret: ""

# -- Persistent storage for GoClaw data and workspace
persistence:
  data:
    enabled: true
    size: 5Gi
    storageClass: ""
  workspace:
    enabled: true
    size: 10Gi
    storageClass: ""

# -- Ingress configuration
ingress:
  enabled: false
  host: ""
  tls: true
  annotations: {}
  className: ""

networkPolicy:
  enabled: false

# -- Health probe configuration for GoClaw server
probes:
  startup:
    path: /health
    initialDelay: 5
    period: 3
    failureThreshold: 10
  readiness:
    path: /health
    period: 10
    timeoutSeconds: 3
  liveness:
    path: /health
    period: 30
    timeoutSeconds: 3

# -- Chrome browser sidecar for web automation
browser:
  enabled: true
  image: zenika/alpine-chrome:124
  port: 9222
  shmSize: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi

# -- Secrets configuration
config:
  gatewayToken: ""
  encryptionKey: ""
  existingSecret: ""

# -- GCPlane: declarative GitOps control plane for GoClaw auto-deployment.
# Watches manifests and continuously reconciles GoClaw resources (providers, agents, channels, etc.)
gcplane:
  enabled: false
  image:
    repository: ghcr.io/dataplanelabs/gcplane
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8480
  # -- Reconciliation interval
  interval: "30s"
  # -- Log format: "text" or "json"
  logFormat: "json"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # -- Drift notification webhook
  webhook:
    url: ""
    # -- Format: slack, discord, googlechat, teams, telegram
    format: "slack"
  # -- GoClaw manifest YAML for auto-deployment.
  # Supports ${GOCLAW_TOKEN} variable substitution at runtime.
  # When empty, a default manifest is generated that connects to the in-cluster GoClaw service.
  # Example:
  #   manifest: |
  #     apiVersion: gcplane/v1
  #     kind: Manifest
  #     metadata:
  #       name: my-goclaw
  #     spec:
  #       provider:
  #         url: http://goclaw:18790
  #     resources:
  #       - kind: Provider
  #         name: anthropic
  #         spec:
  #           type: anthropic
  #           apiKey: ${ANTHROPIC_API_KEY}
  manifest: ""
  extraEnv: []
